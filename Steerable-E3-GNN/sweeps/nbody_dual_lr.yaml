program: main.py
method: bayes
project: "nbody_sweeps"
entity: "mls-2"
metric:
  name: Best Val MSE
  goal: minimize
parameters:
  dataset:
    value: "nbody"
  epochs:
    value: 1000
  max_samples:
    value: 3000
  model:
    value: "segnn"
  lmax_h:
    value: 1
  lmax_attr:
    value: 1
  layers:
    value: 4
  hidden_features:
    value: 64
  subspace_type:
    value: "weightbalanced"
  norm:
    value: "none"
  batch_size:
    value: 100
  gpus:
    value: 1
  weight_decay:
    value: 0.0
  dual_lr:
    distribution: uniform
    min: 1e-6
    max: 1e-1
